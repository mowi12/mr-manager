name: Bug report
description: Report a reproducible problem in mr-manager
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail so we can reproduce it quickly.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the actual behavior.
      placeholder: When I run `mr-manager`, ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: I expected ...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Share a minimal, ordered set of steps.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: config-snippet
    attributes:
      label: Relevant config/code snippet
      description: Paste relevant `~/.mrconfig`, command, or code snippet.
      render: shell

  - type: input
    id: version
    attributes:
      label: mr-manager version
      placeholder: 0.1.0

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.13.x"

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 14 / Ubuntu 24.04 / Windows 11
