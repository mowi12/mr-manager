name: Documentation improvement
description: Report unclear, incorrect, or missing documentation
title: "[Docs]: "
labels:
  - documentation
body:
  - type: textarea
    id: location
    attributes:
      label: Where is the problem?
      description: Share a file path or URL.
      placeholder: README.md, section "Installation"
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: What is unclear or incorrect?
      placeholder: The docs say ... but ...
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      placeholder: It should say ...
    validations:
      required: true
