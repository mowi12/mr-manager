version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "16:00"

    labels:
      - "dependencies"
      - "github-actions"

    commit-message:
      prefix: "chore"
      include: "scope"

    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "16:00"

    open-pull-requests-limit: 10

    cooldown:
      semver-major-days: 7
      semver-minor-days: 3
      semver-patch-days: 1

    labels:
      - "dependencies"

    commit-message:
      prefix: "chore"
      include: "scope"

    groups:
      dev-tooling:
        dependency-type: "development"
        patterns:
          - "*"
